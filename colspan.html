<!DOCTYPE html>
<html>
<head>
<title>Table with Colspan</title>
</head>

<body>

<h2>Table with Colspan Example</h2>

<table border="1">

<tr>
<th colspan="3">Student Information</th>
</tr>

<tr>
<th>Name</th>
<th>Department</th>
<th>Year</th>
</tr>

<tr>
<td>John Doe</td>
<td>Computer Science</td>
<td>2nd Year</td>
</tr>

<tr>
<td>Jane Smith</td>
<td>Physics</td>
<td>1st Year</td>
</tr>

<tr>
<td colspan="3"><center>End of Table</center></td>
</tr>

</table>

</body>
</html>
